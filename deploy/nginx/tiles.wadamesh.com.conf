# tiles.wadamesh.com — OSM tile proxy for the wadamesh map tab.
#
# The firmware fetches plain HTTP (on-device HTTPS isn't workable: mbedTLS wants
# ~30 KB heap for a handshake and only ~5 KB is free after Wi-Fi associates), so
# this vhost is HTTP-only by design. Cloudflare sits in front and caches the
# .png tiles at the edge; this origin keeps a second 14-day disk cache.
#
# Deploy: copy to /etc/nginx/sites-available/, symlink into sites-enabled/, then
#   nginx -t && systemctl reload nginx
# Cloudflare: tiles.wadamesh.com proxied (orange cloud), SSL/TLS mode "Flexible"
#   (CF<->origin HTTP), and a Cache Rule: Eligible for cache + Edge TTL ~14d for
#   path "/*". Do NOT enable "Always Use HTTPS" on this hostname.

proxy_cache_path /var/cache/nginx/wadamesh-tiles levels=1:2
    keys_zone=wadamesh_tiles:10m max_size=4g inactive=14d use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name tiles.wadamesh.com;

    # Re-resolve the upstream at request time. A literal hostname in proxy_pass
    # fails with "no resolver defined" on a fresh box; a variable + resolver works.
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # The location regex is DOUBLE-QUOTED on purpose: nginx's lexer otherwise
    # treats { and } (quantifiers) as block delimiters and refuses to start.
    location ~ "^/(\d{1,2})/(\d{1,7})/(\d{1,7})\.png$" {
        set $osm_upstream "tile.openstreetmap.org";

        proxy_pass https://$osm_upstream/$1/$2/$3.png;
        proxy_ssl_server_name on;
        proxy_set_header Host tile.openstreetmap.org;
        # OSM tile usage policy requires a valid, identifying User-Agent.
        proxy_set_header User-Agent "wadamesh-tile-proxy/1.0 (+https://wadamesh.com)";
        proxy_set_header Referer "https://wadamesh.com/";

        proxy_cache wadamesh_tiles;
        proxy_cache_valid 200 302 14d;
        proxy_cache_valid 404 1h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
        expires 14d;
    }

    location / { return 404; }
}
